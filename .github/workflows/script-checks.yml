name: Script checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bash-and-shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Bash syntax
        run: |
          bash -n install-xhttp-vps.sh
          bash -n finish-xhttp-vps.sh
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
